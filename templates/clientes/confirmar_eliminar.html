{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="card shadow-lg border-0 mx-auto" style="max-width: 500px; border-radius: 15px;">
        <div class="card-body p-4 text-center">
            <h4 class="text-danger mb-3">¿Eliminar esta dirección?</h4>
            <p class="text-muted">¿Estás seguro de que deseas eliminar <strong>{{ direccion.identificador }}</strong>?
                Esta acción no se puede deshacer.</p>

            <form method="POST" class="mt-4">
                {% csrf_token %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger btn-lg">Sí, eliminar permanentemente</button>
                    <a href="{% url 'clientes:listar_direcciones' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
